services:
  # ── Workshop dev environment ─────────────────────────────────────────────
  # Interactive shell with all tools (poe, pytest, ruff, locust, etc.)
  # Usage:
  #   docker compose run --rm workshop bash
  #   docker compose run --rm workshop poe test-exercises
  #   docker compose run --rm workshop poe test-solutions
  workshop:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        python -m grpc_tools.protoc -I protos --python_out=chat/generated --grpc_python_out=chat/generated protos/chat.proto
        exec bash

  # ── Automated exercise test runner ───────────────────────────────────────
  # Runs Gherkin tests for all exercises.
  # Usage:  docker compose run --rm test-exercises
  test-exercises:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        python -m grpc_tools.protoc -I protos --python_out=chat/generated --grpc_python_out=chat/generated protos/chat.proto
        pytest tests/step_defs/ -v

  # ── Solution test runner ─────────────────────────────────────────────────
  # Runs the full reference test suite.
  # Usage:  docker compose run --rm test-solutions
  test-solutions:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        python -m grpc_tools.protoc -I protos --python_out=chat/generated --grpc_python_out=chat/generated protos/chat.proto
        pytest tests/test_chat.py -v

  # ── Production chat server ───────────────────────────────────────────────
  chat-server:
    build: .
    ports:
      - "50051:50051"   # gRPC
      - "8000:8000"     # Prometheus metrics
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50051'); ch.close()"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - chat-server

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
